<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
    <link rel="stylesheet" href="{{STYLE_URI}}">
</head>
<body>
    <script>window.__persistentState = {{PERSISTENT_STATE}};</script>
    <div class="filter-section">
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="modified-checkbox" checked>
                已修改
            </label>
            <label>
                <input type="checkbox" id="added-checkbox" checked>
                新增
            </label>
            <label>
                <input type="checkbox" id="deleted-checkbox" checked>
                已删除
            </label>
            <label>
                <input type="checkbox" id="unversioned-checkbox" checked>
                未版本控制
            </label>
            <label>
                <input type="checkbox" id="missing-checkbox" checked>
                丢失
            </label>
            {{CHANGELIST_CHECKBOXES}}
        </div>
    </div>

    <div class="file-list-container">
        <div class="file-list">
            <div class="file-list-header">
                <span class="checkbox-cell">
                    <input type="checkbox" id="selectAll">
                </span>
                <span>文件名 <span id="fileCountInfo" class="file-count-info">已选 0 / 共 0</span></span>
                <span>路径</span>
                <span class="file-status">状态</span>
                <span class="file-action">操作</span>
            </div>
            <div id="fileListContent">
                {{FILE_LIST}}
            </div>
        </div>
    </div>

    <div class="commit-section">
        <textarea id="commitMessage" placeholder="请输入提交信息">{{LAST_COMMIT_MESSAGE}}</textarea>
        <div class="button-container">
            <select id="historySelect" class="history-select">
                <option value="">历史提交记录</option>
                {{PREFIX_OPTIONS}}
            </select>
            <button id="generateAIButton">使用AI生成提交日志</button>
            <button id="submitButton">提交</button>
        </div>
    </div>

    <script src="{{SCRIPT_URI}}"></script>
</body>
</html>
